name: Deploy demo-ui to Hugging Face Space

on:
  push:
    branches: [demo-ui]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout demo-ui
        uses: actions/checkout@v4
        with:
          ref: demo-ui
          fetch-depth: 0
          lfs: true

      - name: Push Space app files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: pudas96/AstroGPT
        run: |
          set -euo pipefail

          if [ -z "${HF_TOKEN:-}" ]; then
            echo "HF_TOKEN is not set"
            exit 1
          fi

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git clone "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}" /tmp/hf_space

          find /tmp/hf_space -mindepth 1 -maxdepth 1 \
            ! -name ".git" \
            -exec rm -rf {} +

          mkdir -p /tmp/hf_space/assets
          mkdir -p /tmp/hf_space/data/cache

          cp app.py /tmp/hf_space/app.py
          cp requirements.txt /tmp/hf_space/requirements.txt

          if [ -f README.md ]; then
            cp README.md /tmp/hf_space/README.md
          fi

          cp assets/NGC602.jpg /tmp/hf_space/assets/NGC602.jpg
          cp data/cache/papers.jsonl /tmp/hf_space/data/cache/papers.jsonl

          cd /tmp/hf_space
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Deploy from GitHub demo-ui"
          git push
