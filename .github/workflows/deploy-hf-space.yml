name: Deploy demo-ui to Hugging Face Space

on:
  push:
    branches: [demo-ui]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout demo-ui
        uses: actions/checkout@v4
        with:
          ref: demo-ui
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hugging Face CLI with Xet support
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade "huggingface_hub[hf_xet]>=0.32.0"

      - name: Upload Space files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: pudas96/AstroGPT
        run: |
          set -euo pipefail

          if [ -z "${HF_TOKEN:-}" ]; then
            echo "HF_TOKEN is not set"
            exit 1
          fi

          hf auth login --token "$HF_TOKEN"

          hf upload "$HF_SPACE_REPO" . \
            --repo-type space \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude ".DS_Store" \
            --exclude ".env" \
            --exclude "logs/*" \
            --delete "*" \
            --commit-message "Deploy from GitHub demo-ui"
